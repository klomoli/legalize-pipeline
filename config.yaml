# Legalize pipeline configuration
# Per-country settings under the countries: section.
# Override with CLI args (--data-dir, --repo-path, etc.)

git:
  committer_name: "Legalize"
  committer_email: "legalize@legalize.dev"
  branch: "main"
  push: false

countries:
  ad:
    repo_path: "../countries/ad"
    data_dir: "../countries/data-ad"
    cache_dir: ".cache"
    max_workers: 1
    source:
      api_base: "https://bopaazurefunctions.azurewebsites.net/api"
      blob_base: "https://bopadocuments.blob.core.windows.net/bopa-documents"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 4.0

  ar:
    repo_path: "../countries/ar"
    data_dir: "../countries/data-ar"
    cache_dir: ".cache"
    max_workers: 4
    source:
      base_url: "http://servicios.infoleg.gob.ar/infolegInternet"
      catalog_url: "https://datos.jus.gob.ar/dataset/d9a963ea-8b1d-4ca3-9dd9-07a4773e8c23/resource/bf0ec116-ad4e-4572-a476-e57167a84403/download/base-infoleg-normativa-nacional.zip"
      modifications_url: "https://datos.jus.gob.ar/dataset/d9a963ea-8b1d-4ca3-9dd9-07a4773e8c23/resource/0c4fdafe-f4e8-4ac2-bc2e-acf50c27066d/download/base-complementaria-infoleg-normas-modificadas.zip"
      request_timeout: 60
      max_retries: 5
      requests_per_second: 1.0

  es:
    repo_path: "../countries/es"
    data_dir: "../countries/data-es"
    cache_dir: ".cache"
    max_workers: 1
    source:
      base_url: "https://www.boe.es/datosabiertos"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0
      user_agent: "legalize-bot/1.0 (+https://github.com/legalize-dev/legalize)"

  fr:
    repo_path: "../countries/fr"
    data_dir: "../countries/data-fr"
    max_workers: 1
    source:
      # Download LEGI dump: ftp://echanges.dila.gouv.fr/LEGI/
      # Extract and set legi_dir to the root
      legi_dir: "../countries/data-fr/legi"

  se:
    repo_path: "../countries/se"
    data_dir: "../countries/data-se"
    max_workers: 1
    source: {}  # Riksdagen API, no config needed

  at:
    repo_path: "../countries/at"
    data_dir: "../countries/data-at"
    max_workers: 8
    source: {}  # RIS OGD API, no config needed

  de:
    repo_path: "../countries/de"
    data_dir: "../countries/data-de"
    cache_dir: ".cache"
    max_workers: 1
    source:
      base_url: "https://www.gesetze-im-internet.de"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0

  ee:
    repo_path: "../countries/ee"
    data_dir: "../countries/data-ee"
    cache_dir: ".cache"
    max_workers: 4
    source:
      base_url: "https://www.riigiteataja.ee"
      bulk_url: "https://www.riigiteataja.ee/avaandmed/ERT"
      legi_dir: "../countries/data-ee/legi"
      request_timeout: 60
      max_retries: 5
      requests_per_second: 2.0
      document_types:
        - "seadus"
        - "määrus"
      text_types:
        - "terviktekst"
        - "algtekst-terviktekst"

  it:
    repo_path: "../countries/it"
    data_dir: "../countries/data-it"
    cache_dir: ".cache"
    max_workers: 4
    source:
      api_base: "https://api.normattiva.it/t/normattiva.api"
      web_base: "https://www.normattiva.it"
      request_timeout: 30

  cl:
    repo_path: "../countries/cl"
    data_dir: "../countries/data-cl"
    # BCN's obtxml endpoint returns 429 above ~4 req/s sustained — measured
    # 2026-04-07. The search endpoint tolerated more, but per-norm fetches
    # are the bulk of the work, so we cap at 2 workers x 1 req/s = ~2 req/s
    # effective. Conservative but reliable; full bootstrap of ~6.4k norms
    # takes ~1h.
    max_workers: 2
    source:
      base_url: "https://www.leychile.cl"
      search_url: "https://nuevo.leychile.cl/servicios/Consulta/script/exportarBSimpleMetas"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 1.0
      ranks:
        - "Ley"
        - "Decreto con Fuerza de Ley"
        - "Decreto Ley"
        - "Decreto Supremo"
        - "Tratado Internacional"
        - "Ley Orgánica Constitucional"
        - "Ley de Quórum Calificado"
        - "Decreto"

  lt:
    repo_path: "../countries/lt"
    data_dir: "../countries/data-lt"
    max_workers: 8
    source:
      api_url: "https://get.data.gov.lt"
      dataset: "datasets/gov/lrsk/teises_aktai/Dokumentas"
      suvestine_dataset: "datasets/gov/lrsk/teises_aktai/Suvestine"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0

  lu:
    repo_path: "../countries/lu"
    data_dir: "../countries/data-lu"
    cache_dir: ".cache"
    # Legilux open data: SPARQL (discovery) + filestore (XML downloads).
    # No documented rate limits. Benchmarked 2026-04-13: server handles
    # 150+ req/s without errors. XML URLs derived deterministically from
    # ELI (no per-norm SPARQL needed for download). Only consolidation
    # queries hit SPARQL (~1,317 laws have history).
    #
    # Benchmark (50 laws, filestore GET):
    #   1w  → 20 req/s (HTTP latency bound)
    #   4w  → 67 req/s
    #   8w  → 112 req/s
    #  12w  → 153 req/s (zero errors at all levels)
    #
    # Settled on 8w × 10 req/s = polite but fast.
    # Full bootstrap (~24K acts + ~4K consolidation XMLs):
    #   downloads: ~28K files / ~80 eff req/s → ~6 min
    #   SPARQL consolidation queries: ~24K / ~10 q/s → ~40 min
    #   parsing + commits: ~30 min
    #   Total: ~1.5h
    max_workers: 8
    source:
      sparql_url: "https://data.legilux.public.lu/sparqlendpoint"
      filestore_url: "https://data.legilux.public.lu/filestore"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 10.0
      doc_types:
        - "LOI"
        - "RGD"
        - "Constitution"

  pt:
    repo_path: "../countries/pt"
    data_dir: "../countries/data-pt"
    max_workers: 1
    source:
      # Download SQLite dump from https://uploads.tretas.org/
      # Decompress: bunzip2 YYYY-MM-DD-DRE.sqlite3.bz2
      db_path: "../countries/data-pt/2026-03-01-DRE.sqlite3"

  ro:
    repo_path: "../countries/ro"
    data_dir: "../countries/data-ro"
    max_workers: 8
    source:
      base_url: "https://legislatie.just.ro"
      requests_per_second: 2.0
      request_timeout: 60
      max_retries: 5

  uy:
    repo_path: "../countries/uy"
    data_dir: "../countries/data-uy"
    max_workers: 8
    source:
      # IMPO has no documented rate limit. Benchmarked 2026-04-07:
      # 1 worker × 1 req/s → ~5.3 sec/norm wall time (HTTP latency dominates).
      # 8 workers × 2 req/s → ~3.5x speedup → ~1.5 sec/norm.
      # Full ~20K leyes ≈ 4-5h (fetch only; discovery adds another ~2h).
      base_url: "https://www.impo.com.uy"
      requests_per_second: 2.0
      request_timeout: 30
      max_retries: 3
      collections:
        - "leyes"
        - "decretos-ley"
        - "constitucion"
      law_number_max: 20500

  lv:
    repo_path: "../countries/lv"
    data_dir: "../countries/data-lv"
    max_workers: 12
    source:
      # likumi.lv robots.txt has Crawl-delay: 1, but the server tolerates
      # 11+ req/s without errors (tested 2026-04-07). Tuned for local bootstrap:
      # 12 workers x 2 req/s = 24 req/s max (~10 req/s effective after HTTP
      # latency). Full ~48K bootstrap: ~1.5h.
      base_url: "https://likumi.lv"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0

  pl:
    repo_path: "../countries/pl"
    data_dir: "../countries/data-pl"
    cache_dir: ".cache"
    max_workers: 8
    source:
      # ELI API of the Polish Sejm — public, no auth.
      # See RESEARCH-POLAND.md for the full inventory.
      # Scope v1: DU publisher only, HTML-only client-side filter.
      # The API's WAF rejects unknown query parameters, so `html_only` is
      # enforced by the discovery layer, not by the URL.
      #
      # Benchmark 2026-04-07 (50 DU acts, metadata + text, 8 workers):
      #    4 req/s → 0.51 s/act → ~8.5 h for 60K acts
      #    8 req/s → 0.26 s/act → ~4.3 h for 60K acts
      #   12 req/s → 0.19 s/act → ~3.2 h for 60K acts
      # Zero 429/5xx at every rate. Settled on 8 req/s as a polite default.
      #
      # year_start=2000: HTML coverage is ~100% from ~2012, ~5-50% in 2000-2011,
      # and ~0% before 2000. Iterating 1918-1999 just wastes discovery requests.
      base_url: "https://api.sejm.gov.pl/eli"
      publisher: "DU"
      year_start: 2000
      html_only: true
      request_timeout: 30
      max_retries: 5
      requests_per_second: 8.0

  gr:
    repo_path: "../countries/gr"
    data_dir: "../countries/data-gr"
    cache_dir: ".cache"
    # max_workers: 1 because pypdfium2 + pdfplumber are NOT thread-safe.
    # Running PDF extraction in the engine's ThreadPoolExecutor crashes
    # with EXC_BREAKPOINT/SIGTRAP at any worker count > 1 (verified
    # 2026-04-08 on macOS). Daily updates process 1-2 norms so single-
    # threaded is fine. A future refactor could move PDF extraction to
    # a child process to lift this constraint.
    max_workers: 1
    source:
      # Official source: searchetv99 Azure Functions API + Azure Blob.
      # The same backend that powers https://search.et.gr/. Verified
      # public, no authentication, CORS-open with Origin header.
      # Endpoints: simplesearch (discovery), documententitybyid
      # (metadata), timeline (modification graph — Phase 2 reforms),
      # tagsbydocumententity (tags), namedentity (NER).
      # PDFs at ia37rg02wpsa01.blob.core.windows.net/fek/{II}/{YYYY}/.
      # Verified rate ceiling 2026-04-08: ~21 req/s sustained without
      # errors. We use 4 req/s × 12 workers = 48 req/s aggregate cap
      # (real throughput is API-limited).
      api_base: "https://searchetv99.azurewebsites.net/api"
      blob_base: "https://ia37rg02wpsa01.blob.core.windows.net/fek"
      request_timeout: 60
      max_retries: 5
      requests_per_second: 4.0

  nl:
    repo_path: "../countries/nl"
    data_dir: "../countries/data-nl"
    cache_dir: ".cache"
    # Bootstrap downloads every historical expression of every law (the BWB
    # preserves them all) and produces one git commit per real reform.
    # Start at 4 workers × 2 req/s = 8 req/s effective — tuned for politeness
    # against zoekservice.overheid.nl + repository.officiele-overheidspublicaties.nl.
    # Estimated 22K active laws × ~6 expressions avg → ~130K downloads → ~4-5 h.
    max_workers: 4
    source:
      # Basis Wetten Bestand (BWB) — official Dutch consolidated legislation.
      # Two interfaces: SRU (discovery + metadata) and HTTPS repository (full XML).
      # License CC0-1.0. No auth. See RESEARCH-NL.md for full API documentation.
      sru_url: "https://zoekservice.overheid.nl/sru/Search"
      repo_url: "https://repository.officiele-overheidspublicaties.nl/bwb"
      portal_url: "https://wetten.overheid.nl"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0
      # Download every historical expression of every law so git history
      # reflects each real reform. Set to false for a lightweight bootstrap
      # that only commits the current state.
      include_history: true

  "no":
    repo_path: "../countries/no"
    data_dir: "../countries/data-no"
    # Single-threaded: the public data dump is a single archive download,
    # not per-law HTTP requests. Bootstrap processes 781 files locally.
    max_workers: 1
    source:
      # Lovdata public data API — no authentication required.
      # License: NLOD 2.0 (Norwegian Licence for Open Government Data).
      # Downloads gjeldende-lover.tar.bz2 (~5.6 MB, 781 current laws).
      # Historical versions require authenticated API (pending API key
      # request to api@lovdata.no — see RESEARCH-NO.md).
      api_base: "https://api.lovdata.no/v1/publicData"

  be:
    repo_path: "../countries/be"
    data_dir: "../countries/data-be"
    cache_dir: ".cache"
    # Benchmark 2026-04-11 (50 recent laws × 1 version each, 10 older 1995
    # laws × ~2 versions each):
    #   1 worker  × 1.0 req/s → 0.45 laws/s  (22s for 10 old laws)
    #   4 workers × 2.0 req/s → 1.94 laws/s  (5.2s for 10 old laws) — sweet spot
    #   8 workers × 2.0 req/s → 1.78 laws/s  (5.6s) — no further gain
    # 100% success, zero 429/503. 8 workers plateaus because the older
    # laws spend most of their time fetching 1-3 archive pages per law,
    # and the single-URL cache + per-client rate limiter leaves little
    # parallelism headroom beyond 4.
    #
    # Full bootstrap projection (primary legislation only, ~40K norms):
    #   40,000 laws × avg 2 versions = 80,000 fetches
    #   at ~2 laws/s effective → ~5-6 hours end-to-end.
    max_workers: 4
    source:
      base_url: "https://www.ejustice.just.fgov.be"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0

  cz:
    repo_path: "../countries/cz"
    data_dir: "../countries/data-cz"
    cache_dir: ".cache"
    # Benchmark 2026-04-12 (50 laws, metadata-only):
    #   1w × 5 r/s  →  4.9 laws/s (10s)
    #   4w × 5 r/s  → 18.0 laws/s (2.8s) — sweet spot
    #   8w × 5 r/s  → 29.2 laws/s (1.7s) — zero 429/503
    # Full text fetches are heavier (multi-page fragments for big laws),
    # so use 4 workers conservatively. Zero rate-limit errors observed
    # up to 40 req/s aggregate.
    max_workers: 4
    source:
      base_url: "https://e-sbirka.gov.cz/sbr-cache"
      request_timeout: 30
      max_retries: 3
      requests_per_second: 5.0

  ua:
    repo_path: "../countries/ua"
    data_dir: "../countries/data-ua"
    # Benchmark 2026-04-13 (50 laws, .txt + .xml per law):
    #   1w × 1.0 r/s → 0.21 laws/s (0 errors)
    #   2w × 1.5 r/s → 0.34 laws/s (0 errors) — sweet spot
    #   4w × 2.0 r/s → 0.44 laws/s (5 errors, 429 Too Many Requests)
    # API rate limit: 60 req/min. Each law = 2 reqs (.txt + .xml).
    # Full bootstrap (~43K laws): ~35h at 2w × 1.5 r/s.
    max_workers: 2
    source:
      base_url: "https://data.rada.gov.ua"
      zakon_base_url: "https://zakon.rada.gov.ua"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 1.5
      type_lists: ["t1", "t3", "t4", "t5", "t21", "t216"]
      include_perv1: true

  fi:
    repo_path: "../countries/fi"
    data_dir: "../countries/data-fi"
    cache_dir: ".cache"
    # Finlex API: public REST, no auth, returns 429 on overload.
    # Benchmark 2026-04-13 (50 acts, metadata + text, 2 reqs/law):
    #   1w × 1.0 r/s → 0.63 laws/s (0 errors)
    #   8w × 4.0 r/s → 2.46 laws/s (0 errors)
    #   8w × 8.0 r/s → 4.72 laws/s (0 errors)
    #  16w × 16  r/s → 8.96 laws/s (0 errors)
    # Discovery /list endpoint rate-limits at ~4 req/s → use 1.5 r/s.
    # Full bootstrap (~27K laws): ~8-10h at 4w × 1.5 r/s.
    max_workers: 4
    source:
      api_base: "https://opendata.finlex.fi/finlex/avoindata/v1"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 1.5

  dk:
    repo_path: "../countries/dk"
    data_dir: "../countries/data-dk"
    cache_dir: ".cache"
    # Retsinformation ELI XML: no auth, behind Cloudflare.
    # Benchmark 2026-04-13 (50 laws, XML fetch + parse):
    #   1w × 2.0 r/s → 2.01 laws/s (0 errors)
    #   4w × 4.0 r/s → 3.96 laws/s (0 errors) — sweet spot
    #   8w × 8.0 r/s → 3.94 laws/s (0 errors) — server bottleneck, no gain
    # Zero 429/5xx at any rate tested. Cloudflare absorbs burst.
    # Full bootstrap (~63K lta documents): ~4.5h at 4w × 4 r/s.
    max_workers: 4
    source:
      base_url: "https://www.retsinformation.dk"
      harvest_api: "https://api.retsinformation.dk"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 4.0

  sk:
    repo_path: "../countries/sk"
    data_dir: "../countries/data-sk"
    cache_dir: ".cache"
    # Slov-Lex static site + API gateway. No documented rate limits.
    # Response time ~50ms. No auth required. Zero 429/5xx observed in testing.
    # Each law requires 1 history page + N version portal fragments.
    # Full bootstrap (~26K laws × ~3-5 versions avg): ~80K-130K requests.
    # At 4 workers × 2 req/s = 8 req/s → ~4-5h fetch time.
    max_workers: 4
    source:
      api_base: "https://api-gateway.slov-lex.sk"
      static_base: "https://static.slov-lex.sk"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0

  eu:
    repo_path: "../countries/eu"
    data_dir: "../countries/data-eu"
    cache_dir: ".cache"
    # CELLAR SPARQL + REST API. Public, no auth. Virtuoso backend
    # with 60-second query timeout. No documented rate limits, but
    # recommended to stay under 5 concurrent connections per IP.
    # Discovery: ~16K in-force regulations via paged SPARQL (~16 pages × 400ms).
    # Text: XHTML consolidated texts via CELLAR REST (~450KB-4.6MB each).
    # Each regulation needs: 1 SPARQL (consolidations) + N XHTML downloads.
    # Full bootstrap (~16K regs × ~2 consolidations avg): ~48K requests.
    # At 4 workers × 2 req/s = 8 req/s → ~1.5-2h fetch time.
    max_workers: 4
    source:
      sparql_url: "https://publications.europa.eu/webapi/rdf/sparql"
      request_timeout: 30
      max_retries: 5
      requests_per_second: 2.0
      reg_types:
        - "REG"
        - "REG_IMPL"
        - "REG_DEL"
        - "REG_FINANC"
