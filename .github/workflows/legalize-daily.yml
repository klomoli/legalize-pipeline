name: legalize daily (es)
on:
  schedule:
    - cron: '0 5,17 * * *'      # 06:00 + 18:00 Madrid (CET=05/17 UTC, CEST=04/16 UTC)
  workflow_dispatch:

concurrency:
  group: legalize-daily
  cancel-in-progress: true

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout pipeline
        uses: actions/checkout@v4
        with:
          path: pipeline

      - name: checkout opolex-laws-es
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.OPOLEX_LAWS_REPO }}
          token: ${{ secrets.OPOLEX_LAWS_TOKEN }}
          path: opolex-laws-es
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install pipeline
        working-directory: pipeline
        run: pip install -e ".[dev]"

      - name: legalize daily -c es
        working-directory: pipeline
        env:
          GIT_AUTHOR_NAME:  ${{ vars.OPOLEX_BOT_NAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.OPOLEX_BOT_EMAIL }}
        run: |
          legalize daily -c es --config config-opolex.yaml

      - name: push if changed
        working-directory: opolex-laws-es
        env:
          OPOLEX_BOT_NAME: ${{ vars.OPOLEX_BOT_NAME }}
          OPOLEX_BOT_EMAIL: ${{ vars.OPOLEX_BOT_EMAIL }}
        run: |
          git config user.name  "$OPOLEX_BOT_NAME"
          git config user.email "$OPOLEX_BOT_EMAIL"
          if [ -n "$(git status --porcelain)" ]; then
            git status
            echo "::error::pipeline left uncommitted changes — should not happen"
            exit 1
          fi
          git push origin main
