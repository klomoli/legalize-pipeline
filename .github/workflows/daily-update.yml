name: Daily update

on:
  schedule:
    # Mon-Sat at 10:00 UTC
    - cron: "0 10 * * 1-6"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: false
        type: string
        default: "es"
      date:
        description: "Date to process (YYYY-MM-DD), empty = automatic"
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: ${{ fromJson(inputs.country && format('["{0}"]', inputs.country) || '["es","fr"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          repository: legalize-dev/legalize-${{ matrix.country }}
          path: repos/${{ matrix.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily pipeline
        run: |
          DATE_FLAG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_FLAG="--date ${{ inputs.date }}"
          fi
          legalize daily -c "${{ matrix.country }}" --repo-path "repos/${{ matrix.country }}" $DATE_FLAG --push
