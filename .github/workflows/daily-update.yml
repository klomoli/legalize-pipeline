name: Daily update

on:
  schedule:
    # Mon-Sat at 10:00 UTC
    - cron: "0 10 * * 1-6"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, at, de, se, pt, lv, ad, lt, ee, pl, uy, gr, nl, be, cz, fi, it, lu, eu)"
        required: false
        type: string
        default: ""
      date:
        description: "Date to process (YYYY-MM-DD), empty = automatic"
        required: false
        type: string

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: ${{ fromJson(inputs.country && format('["{0}"]', inputs.country) || '["es","fr","at","de","se","pt","lv","ad","lt","ee","pl","uy","gr","nl","be","cz","fi","it","lu","eu"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}
          owner: legalize-dev
          repositories: legalize-${{ matrix.country }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: legalize-dev/legalize-${{ matrix.country }}
          path: repos/${{ matrix.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily pipeline
        env:
          INPUT_DATE: ${{ inputs.date }}
          INPUT_COUNTRY: ${{ matrix.country }}
        run: |
          DATE_FLAG=""
          if [ -n "$INPUT_DATE" ]; then
            DATE_FLAG="--date $INPUT_DATE"
          fi
          legalize daily -c "$INPUT_COUNTRY" --repo-path "repos/$INPUT_COUNTRY" $DATE_FLAG --push
