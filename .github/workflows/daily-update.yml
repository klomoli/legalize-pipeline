name: Daily update

on:
  schedule:
    # Mon-Sat at 10:00 UTC
    - cron: "0 10 * * 1-6"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: false
        type: string
        default: "es"
      date:
        description: "Date to process (YYYY-MM-DD), empty = automatic"
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          repository: legalize-dev/legalize-${{ inputs.country || 'es' }}
          path: repos/${{ inputs.country || 'es' }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Compute target date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "target=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            # Previous weekday (skip Sunday): Sat→Fri, Sun→Fri, Mon→Sat, else→yesterday
            DOW=$(date -u +%u)  # 1=Mon, 7=Sun
            if [ "$DOW" = "1" ]; then
              TARGET=$(date -u -d "2 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-2d +%Y-%m-%d)
            elif [ "$DOW" = "7" ]; then
              TARGET=$(date -u -d "2 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-2d +%Y-%m-%d)
            else
              TARGET=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
            fi
            echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily pipeline
        run: |
          COUNTRY="${{ inputs.country || 'es' }}"
          legalize daily -c "$COUNTRY" --repo-path "repos/$COUNTRY" --date "${{ steps.date.outputs.target }}" --push
