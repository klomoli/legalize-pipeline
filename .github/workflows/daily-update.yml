name: Daily update

on:
  schedule:
    # Mon-Sat at 10:00 UTC
    - cron: "0 10 * * 1-6"
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, at, de, se, pt, lv, ad, lt)"
        required: false
        type: string
        default: ""
      date:
        description: "Date to process (YYYY-MM-DD), empty = automatic"
        required: false
        type: string

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: ${{ fromJson(inputs.country && format('["{0}"]', inputs.country) || '["es","fr","at","de","se","pt","lv","ad","lt"]') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: legalize-dev/legalize-${{ matrix.country }}
          path: repos/${{ matrix.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily pipeline
        env:
          INPUT_DATE: ${{ inputs.date }}
          INPUT_COUNTRY: ${{ matrix.country }}
        run: |
          DATE_FLAG=""
          if [ -n "$INPUT_DATE" ]; then
            DATE_FLAG="--date $INPUT_DATE"
          fi
          legalize daily -c "$INPUT_COUNTRY" --repo-path "repos/$INPUT_COUNTRY" $DATE_FLAG --push
