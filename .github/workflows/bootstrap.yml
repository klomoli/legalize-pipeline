name: Bootstrap country

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: true
        type: string
        default: "es"
      repo_path:
        description: "Output repo path (e.g., ../countries/es)"
        required: false
        type: string
      dry_run:
        description: "Simulate without creating commits"
        required: false
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          repository: legalize-dev/legalize-${{ inputs.country }}
          path: repos/${{ inputs.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run bootstrap
        run: |
          ARGS="-c ${{ inputs.country }}"
          ARGS="$ARGS --repo-path repos/${{ inputs.country }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          legalize bootstrap $ARGS

      - name: Push to output repo
        if: ${{ !inputs.dry_run }}
        run: |
          cd repos/${{ inputs.country }}
          git push origin HEAD
