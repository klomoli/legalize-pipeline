name: Bootstrap country

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code (es, fr, se)"
        required: true
        type: string
        default: "es"
      repo_path:
        description: "Output repo path (e.g., ../countries/es)"
        required: false
        type: string
      dry_run:
        description: "Simulate without creating commits"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.LEGALIZE_APP_ID }}
          private-key: ${{ secrets.LEGALIZE_APP_PRIVATE_KEY }}
          owner: legalize-dev
          repositories: legalize-${{ inputs.country }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: legalize-dev/legalize-${{ inputs.country }}
          path: repos/${{ inputs.country }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run bootstrap
        env:
          INPUT_COUNTRY: ${{ inputs.country }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="-c $INPUT_COUNTRY"
          ARGS="$ARGS --repo-path repos/$INPUT_COUNTRY"
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          legalize bootstrap $ARGS

      - name: Push to output repo
        if: ${{ !inputs.dry_run }}
        env:
          INPUT_COUNTRY: ${{ inputs.country }}
        run: |
          cd "repos/$INPUT_COUNTRY"
          git push origin HEAD
