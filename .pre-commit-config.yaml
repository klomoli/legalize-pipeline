repos:
  # ─── Pre-commit: fast checks on every commit ───
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint (auto-fix)
        entry: ruff check --fix src/ tests/
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format (auto-fix)
        entry: ruff format src/ tests/
        language: system
        pass_filenames: false
        types: [python]

      - id: country-dispatch
        name: verify country dispatch
        entry: python3 scripts/check-dispatch.py
        language: system
        pass_filenames: false
        types: [python]

  # ─── Standard pre-commit hooks: syntax, hygiene, large files ───
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=2000']
      - id: check-yaml
      - id: check-toml

  # ─── Secret scanning ───
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.secrets\.baseline$'

  # ─── GitHub Actions linting ───
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ─── Pre-push: full test suite (slower, only on push) ───
  - repo: local
    hooks:
      - id: pytest
        name: full test suite
        entry: python3 -m pytest tests/ --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
